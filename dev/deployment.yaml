apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-deployment
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: development
  template:
    metadata:
      labels:
        app: development
    spec:
      containers:
      - name: hello-cloudbuild
        image: us-docker.pkg.dev/qwiklabs-gcp-01-b3b743658c5c/my-repository/hello-cloudbuild:v1.0
        ports:
        - containerPort: 8080
